<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mainline | Individual Account</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="brand">MAINLINE</div>
</header>

<main>

<section class="section">

<h2>Create Your Professional Record</h2>

<p class="section-lead">
Build your Mainline account and begin creating your professional record.
</p>

<div class="split-card">

<h3>Account Information</h3>

<label>First Name</label> <input type="text" class="input">

<label>Last Name</label> <input type="text" class="input">

<label>Email Address</label> <input type="email" class="input">

<label>Password</label> <input type="password" class="input">

<label>Confirm Password</label> <input type="password" class="input">

<h3>Professional Information</h3>

<label>Primary Discipline</label>

<select class="input">
<option>Quality Control / Inspection</option>
<option>Engineering</option>
<option>Skilled Trades</option>
<option>Project Management</option>
<option>Construction Management</option>
<option>Safety / HSE</option>
<option>Operations</option>
</select>

<label>Home Region</label>

<select class="input">
<option>Houston, TX</option>
<option>Baytown, TX</option>
<option>Pasadena, TX</option>
<option>Texas City, TX</option>
<option>Beaumont, TX</option>
<option>Port Arthur, TX</option>
<option>Corpus Christi, TX</option>
<option>Lake Charles, LA</option>
<option>Baton Rouge, LA</option>
<option>New Orleans, LA</option>
</select>

<div class="actions">
<a class="button" href="resume-import.html">
Continue
</a>
</div>

</div>

</section>

</main>

</body>
</html>
